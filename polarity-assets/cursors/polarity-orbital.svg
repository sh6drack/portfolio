<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="coreGrad" cx="30%" cy="30%" r="70%">
      <stop offset="0%" style="stop-color:#6EE7DF"/>
      <stop offset="50%" style="stop-color:#4ECDC4"/>
      <stop offset="100%" style="stop-color:#2BA89F"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="0.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Orbital rings -->
  <ellipse cx="11" cy="11" rx="9" ry="3" fill="none" stroke="#4ECDC4" stroke-width="0.8" transform="rotate(-60 11 11)" opacity="0.8" filter="url(#glow)"/>
  <ellipse cx="11" cy="11" rx="9" ry="3" fill="none" stroke="#FFA07A" stroke-width="0.8" transform="rotate(60 11 11)" opacity="0.8" filter="url(#glow)"/>
  <ellipse cx="11" cy="11" rx="9" ry="3" fill="none" stroke="#BB8FCE" stroke-width="0.8" opacity="0.8" filter="url(#glow)"/>

  <!-- Electron particles -->
  <circle cx="16" cy="4" r="1.5" fill="#4ECDC4" filter="url(#glow)"/>
  <circle cx="6" cy="4" r="1.5" fill="#FFA07A" filter="url(#glow)"/>
  <circle cx="20" cy="11" r="1.5" fill="#BB8FCE" filter="url(#glow)"/>

  <!-- Core nucleus -->
  <circle cx="11" cy="11" r="4" fill="url(#coreGrad)" filter="url(#glow)"/>
  <circle cx="10" cy="10" r="1.5" fill="white" opacity="0.3"/>
</svg>
