  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html {
      scroll-behavior: smooth;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-weight: 700;
      background: #050505;
      color: #fff;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: crosshair;
    }

    /* Grain */
    body::after {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      z-index: 9998;
      opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-repeat: repeat;
      background-size: 256px 256px;
    }

    #webgl-bg {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    .landing {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: clamp(60px, 10vh, 120px);
      padding: 40px;
    }

    /* Name */
    .name {
      font-size: clamp(14px, 2vw, 24px);
      font-weight: 700;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.85);
      line-height: 1;
      opacity: 0;
      opacity: 0;
      animation: materialize 0.6s ease 0.2s forwards;
      user-select: none;
    }

    @keyframes materialize {
      from { opacity: 0; }
      to { opacity: 0.85; }
    }

    /* Fork */
    .fork {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1px;
      width: min(700px, 90vw);
      opacity: 0;
      animation: fadeIn 1.2s cubic-bezier(0.16, 1, 0.3, 1) 1.6s forwards;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    .fork-block {
      position: relative;
      background: rgba(255,255,255,0.02);
      padding: clamp(32px, 5vw, 56px) clamp(24px, 4vw, 40px);
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      text-decoration: none;
      color: inherit;
      transition: background 0.5s ease;
      min-height: clamp(120px, 18vw, 200px);
    }

    .fork-block:hover {
      background: rgba(255,255,255,0.05);
    }

    .fork-block:hover .fork-label {
      color: #fff;
      letter-spacing: 0.08em;
    }

    .fork-block:hover .fork-count {
      color: rgba(255,255,255,0.3);
    }

    .fork-label {
      font-size: clamp(20px, 3.5vw, 36px);
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
      line-height: 1;
      transition: all 0.4s ease;
      margin-bottom: 8px;
    }

    .fork-count {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.08);
      transition: color 0.4s;
    }

    /* Byline - between fork and footer */
    .byline {
      position: fixed;
      bottom: 80px;
      z-index: 1;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.12);
      opacity: 0;
      animation: fadeIn 1s ease 1.2s forwards;
      user-select: none;
    }

    .edge {
      position: fixed;
      bottom: 24px;
      z-index: 1;
      font-size: 8px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.05);
      opacity: 0;
      animation: fadeIn 1s ease 1.6s forwards;
      user-select: none;
    }

    @media (max-width: 500px) {
      .fork {
        grid-template-columns: 1fr;
      }
    }

    /* Reduced motion */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }

  <!-- WASM Particle Engine -->
  <script type="module">
    import init, { ParticleSystem } from './wasm-pkg/wasm_particles.js';

    (async function() {
      await init();

      var canvas = document.getElementById('webgl-bg');
      if (!canvas) return;

      var gl = canvas.getContext('webgl', { alpha: true, antialias: true, premultipliedAlpha: false });
      if (!gl) return;

      var PARTICLE_COUNT = 3000;
      var sys = new ParticleSystem(PARTICLE_COUNT);

      var vsSource = [
        'attribute vec3 aPosition;',
        'attribute float aSize;',
        'attribute float aAlpha;',
        'uniform vec2 uResolution;',
        'uniform float uPixelRatio;',
        'varying float vAlpha;',
        'void main() {',
        '  float depth = 1.0 / (1.0 - aPosition.z * 0.05);',
        '  vec2 pos = aPosition.xy * depth;',
        '  gl_Position = vec4(pos.x / (uResolution.x / uResolution.y), pos.y, 0.0, 1.0);',
        '  gl_PointSize = aSize * depth * uPixelRatio * 2.0;',
        '  vAlpha = aAlpha * 0.6;',
        '}'
      ].join('\n');

      var fsSource = [
        'precision mediump float;',
        'varying float vAlpha;',
        'void main() {',
        '  float d = length(gl_PointCoord - vec2(0.5));',
        '  if (d > 0.5) discard;',
        '  float glow = exp(-d * d * 8.0);',
        '  gl_FragColor = vec4(1.0, 1.0, 1.0, glow * vAlpha);',
        '}'
      ].join('\n');

      function compileShader(type, source) {
        var shader = gl.createShader(type);
        gl.shaderSource(shader, source);
        gl.compileShader(shader);
        return shader;
      }

      var vs = compileShader(gl.VERTEX_SHADER, vsSource);
      var fs = compileShader(gl.FRAGMENT_SHADER, fsSource);
      var program = gl.createProgram();
      gl.attachShader(program, vs);
      gl.attachShader(program, fs);
      gl.linkProgram(program);
      gl.useProgram(program);

      var aPosition = gl.getAttribLocation(program, 'aPosition');
      var aSize = gl.getAttribLocation(program, 'aSize');
      var aAlpha = gl.getAttribLocation(program, 'aAlpha');
      var uResolution = gl.getUniformLocation(program, 'uResolution');
      var uPixelRatio = gl.getUniformLocation(program, 'uPixelRatio');

      var posBuf = gl.createBuffer();
      var sizeBuf = gl.createBuffer();
      var alphaBuf = gl.createBuffer();

      var posData = new Float32Array(PARTICLE_COUNT * 3);
      var sizeData = new Float32Array(PARTICLE_COUNT);
      var alphaData = new Float32Array(PARTICLE_COUNT);

      var mouse = { x: 0, y: 0, tx: 0, ty: 0, active: false };
      document.addEventListener('mousemove', function(e) {
        mouse.tx = (e.clientX / window.innerWidth - 0.5) * 2;
        mouse.ty = -(e.clientY / window.innerHeight - 0.5) * 2;
        mouse.active = true;
      });
      document.addEventListener('mouseleave', function() { mouse.active = false; });

      var scrollY = 0;

      function resize() {
        var dpr = Math.min(window.devicePixelRatio, 2);
        canvas.width = window.innerWidth * dpr;
        canvas.height = window.innerHeight * dpr;
        canvas.style.width = window.innerWidth + 'px';
        canvas.style.height = window.innerHeight + 'px';
        gl.viewport(0, 0, canvas.width, canvas.height);
        sys.set_size(window.innerWidth, window.innerHeight);
      }
      resize();
      window.addEventListener('resize', resize);

      gl.enable(gl.BLEND);
      gl.blendFunc(gl.SRC_ALPHA, gl.ONE);
      gl.disable(gl.DEPTH_TEST);

      var lastTime = 0;

      function frame(now) {
        requestAnimationFrame(frame);
        var dt = Math.min((now - lastTime) / 1000, 0.05);
        lastTime = now;

        mouse.x += (mouse.tx - mouse.x) * 0.06;
        mouse.y += (mouse.ty - mouse.y) * 0.06;

        sys.set_mouse(mouse.x, mouse.y, mouse.active);
        sys.set_scroll(scrollY);
        sys.tick(dt);

        var renderData = sys.get_render_data();

        for (var i = 0; i < PARTICLE_COUNT; i++) {
          var off = i * 5;
          posData[i * 3] = renderData[off];
          posData[i * 3 + 1] = renderData[off + 1];
          posData[i * 3 + 2] = renderData[off + 2];
          sizeData[i] = renderData[off + 3];
          alphaData[i] = renderData[off + 4];
        }

        gl.clearColor(0.0196, 0.0196, 0.0196, 1.0);
        gl.clear(gl.COLOR_BUFFER_BIT);

        gl.useProgram(program);
        gl.uniform2f(uResolution, canvas.width, canvas.height);
        gl.uniform1f(uPixelRatio, Math.min(window.devicePixelRatio, 2));

        gl.bindBuffer(gl.ARRAY_BUFFER, posBuf);
        gl.bufferData(gl.ARRAY_BUFFER, posData, gl.DYNAMIC_DRAW);
        gl.enableVertexAttribArray(aPosition);
        gl.vertexAttribPointer(aPosition, 3, gl.FLOAT, false, 0, 0);

        gl.bindBuffer(gl.ARRAY_BUFFER, sizeBuf);
        gl.bufferData(gl.ARRAY_BUFFER, sizeData, gl.DYNAMIC_DRAW);
        gl.enableVertexAttribArray(aSize);
        gl.vertexAttribPointer(aSize, 1, gl.FLOAT, false, 0, 0);

        gl.bindBuffer(gl.ARRAY_BUFFER, alphaBuf);
        gl.bufferData(gl.ARRAY_BUFFER, alphaData, gl.DYNAMIC_DRAW);
        gl.enableVertexAttribArray(aAlpha);
        gl.vertexAttribPointer(aAlpha, 1, gl.FLOAT, false, 0, 0);

        gl.drawArrays(gl.POINTS, 0, PARTICLE_COUNT);
      }

      requestAnimationFrame(frame);
    })();
  </script>
