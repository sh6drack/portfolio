<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <!-- Base holographic - pink/magenta dominant with color shifts -->
    <linearGradient id="holoBase" x1="20%" y1="80%" x2="80%" y2="20%">
      <stop offset="0%" stop-color="#e4a8c8"/>
      <stop offset="12%" stop-color="#f0b8d8"/>
      <stop offset="24%" stop-color="#d898c8"/>
      <stop offset="36%" stop-color="#98d8b8"/>
      <stop offset="48%" stop-color="#88c8d8"/>
      <stop offset="60%" stop-color="#b898d8"/>
      <stop offset="72%" stop-color="#d8a8c8"/>
      <stop offset="84%" stop-color="#c8e8a8"/>
      <stop offset="100%" stop-color="#e8c8d8"/>
    </linearGradient>

    <!-- Iridescent sweep -->
    <radialGradient id="iridescentSweep" cx="30%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.5"/>
      <stop offset="15%" stop-color="#ffb8e0" stop-opacity="0.6"/>
      <stop offset="30%" stop-color="#b8ffb8" stop-opacity="0.4"/>
      <stop offset="45%" stop-color="#b8d8ff" stop-opacity="0.35"/>
      <stop offset="60%" stop-color="#e8b8ff" stop-opacity="0.4"/>
      <stop offset="75%" stop-color="#ffe8b8" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ffb8c8" stop-opacity="0.2"/>
    </radialGradient>

    <!-- Secondary color sweep -->
    <radialGradient id="iridescentSweep2" cx="70%" cy="70%" r="60%">
      <stop offset="0%" stop-color="#c8ffe8" stop-opacity="0.3"/>
      <stop offset="30%" stop-color="#ffc8e8" stop-opacity="0.25"/>
      <stop offset="60%" stop-color="#c8c8ff" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#ffe8c8" stop-opacity="0.15"/>
    </radialGradient>

    <!-- Light streak -->
    <linearGradient id="lightStreak" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="35%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="45%" stop-color="#ffffff" stop-opacity="0.7"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="55%" stop-color="#ffffff" stop-opacity="0.7"/>
      <stop offset="65%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <!-- Edge depth -->
    <radialGradient id="discEdgeDepth" cx="50%" cy="50%" r="50%">
      <stop offset="88%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="94%" stop-color="#000000" stop-opacity="0.1"/>
      <stop offset="97%" stop-color="#000000" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.35"/>
    </radialGradient>

    <!-- Hub gradients -->
    <radialGradient id="hubMetal" cx="35%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#f8f8f8"/>
      <stop offset="15%" stop-color="#e8e8e8"/>
      <stop offset="35%" stop-color="#d0d0d0"/>
      <stop offset="55%" stop-color="#a8a8a8"/>
      <stop offset="75%" stop-color="#888888"/>
      <stop offset="100%" stop-color="#686868"/>
    </radialGradient>

    <radialGradient id="ringMetal1" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#d8d8d8"/>
      <stop offset="50%" stop-color="#a0a0a0"/>
      <stop offset="100%" stop-color="#707070"/>
    </radialGradient>

    <radialGradient id="ringMetal2" cx="45%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#c0c0c0"/>
      <stop offset="50%" stop-color="#909090"/>
      <stop offset="100%" stop-color="#606060"/>
    </radialGradient>

    <radialGradient id="spindleClamp" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#e0e0e0"/>
      <stop offset="30%" stop-color="#b8b8b8"/>
      <stop offset="60%" stop-color="#909090"/>
      <stop offset="100%" stop-color="#585858"/>
    </radialGradient>

    <!-- Drop shadow for disc -->
    <filter id="discShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Black background -->
  <rect width="1200" height="630" fill="#0a0a0a"/>

  <!-- Disc centered, shifted up slightly to leave room for text at bottom -->
  <g transform="translate(600, 280)" filter="url(#discShadow)">

    <!-- Disc base with holographic surface -->
    <circle cx="0" cy="0" r="230" fill="url(#holoBase)"/>

    <!-- Iridescent color sweeps -->
    <circle cx="0" cy="0" r="230" fill="url(#iridescentSweep)"/>
    <circle cx="0" cy="0" r="230" fill="url(#iridescentSweep2)"/>

    <!-- Data track rings -->
    <g fill="none" stroke-opacity="0.08">
      <circle cx="0" cy="0" r="222" stroke="#000" stroke-width="16"/>
      <circle cx="0" cy="0" r="198" stroke="#fff" stroke-width="1.2"/>
      <circle cx="0" cy="0" r="192" stroke="#000" stroke-width="12"/>
      <circle cx="0" cy="0" r="174" stroke="#fff" stroke-width="0.8"/>
      <circle cx="0" cy="0" r="168" stroke="#000" stroke-width="9"/>
      <circle cx="0" cy="0" r="154" stroke="#fff" stroke-width="0.6"/>
      <circle cx="0" cy="0" r="147" stroke="#000" stroke-width="7"/>
      <circle cx="0" cy="0" r="134" stroke="#fff" stroke-width="0.6"/>
      <circle cx="0" cy="0" r="125" stroke="#000" stroke-width="6"/>
      <circle cx="0" cy="0" r="112" stroke="#fff" stroke-width="0.5"/>
      <circle cx="0" cy="0" r="103" stroke="#000" stroke-width="5"/>
      <circle cx="0" cy="0" r="92" stroke="#fff" stroke-width="0.5"/>
      <circle cx="0" cy="0" r="84" stroke="#000" stroke-width="4"/>
    </g>

    <!-- Light streak reflection -->
    <circle cx="0" cy="0" r="230" fill="url(#lightStreak)"/>

    <!-- Edge depth/shadow -->
    <circle cx="0" cy="0" r="230" fill="url(#discEdgeDepth)"/>

    <!-- Disc rim highlights -->
    <circle cx="0" cy="0" r="228" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.5"
            stroke-dasharray="400 320" stroke-dashoffset="50"/>
    <circle cx="0" cy="0" r="230" fill="none" stroke="#000000" stroke-width="1.5" opacity="0.25"
            stroke-dasharray="400 320" stroke-dashoffset="-200"/>

    <!-- Center Hub Assembly -->
    <circle cx="0" cy="0" r="68" fill="url(#hubMetal)"/>
    <circle cx="0" cy="0" r="68" fill="none" stroke="#888" stroke-width="0.6"/>
    <circle cx="0" cy="0" r="63" fill="none" stroke="#666" stroke-width="2.5"/>
    <circle cx="0" cy="0" r="61" fill="url(#ringMetal1)"/>
    <circle cx="0" cy="0" r="55" fill="none" stroke="#555" stroke-width="2"/>
    <circle cx="0" cy="0" r="52" fill="url(#ringMetal2)"/>
    <circle cx="0" cy="0" r="46" fill="none" stroke="#666" stroke-width="1.2"/>
    <circle cx="0" cy="0" r="43" fill="#a8a8a8"/>
    <circle cx="0" cy="0" r="36" fill="none" stroke="#505050" stroke-width="2.5"/>
    <circle cx="0" cy="0" r="32" fill="url(#spindleClamp)"/>
    <circle cx="0" cy="0" r="26" fill="none" stroke="#606060" stroke-width="2"/>
    <circle cx="0" cy="0" r="22" fill="#909090"/>
    <circle cx="0" cy="0" r="16" fill="none" stroke="#484848" stroke-width="2.5"/>
    <circle cx="0" cy="0" r="12" fill="#787878"/>
    <circle cx="0" cy="0" r="7" fill="#1c1c1c"/>
    <circle cx="0" cy="0" r="5" fill="#282828"/>
    <circle cx="0" cy="0" r="3" fill="#101010"/>

    <!-- Hub specular highlights -->
    <ellipse cx="-20" cy="-24" rx="24" ry="11" fill="#ffffff" opacity="0.6" transform="rotate(-50 -20 -24)"/>
    <ellipse cx="-10" cy="-14" rx="12" ry="6" fill="#ffffff" opacity="0.8" transform="rotate(-50 -10 -14)"/>
    <ellipse cx="14" cy="16" rx="9" ry="4" fill="#ffffff" opacity="0.25" transform="rotate(40 14 16)"/>
  </g>

  <!-- KNOW YOUR MUSIC in Helvetica Bold, small, centered at bottom -->
  <text x="600" y="575"
        font-family="Helvetica, Arial, sans-serif"
        font-size="14"
        font-weight="700"
        fill="#999999"
        text-anchor="middle"
        letter-spacing="3">
    KNOW YOUR MUSIC
  </text>
</svg>
